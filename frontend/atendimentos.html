<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Atendimentos - Sistema Jurídico</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
  <link rel="stylesheet" href="css/reset.css">
  <link rel="stylesheet" href="css/style.css">
  <link rel="stylesheet" href="css/sidebar.css">
  <script src="js/env.js"></script>
</head>
<body>
  <div class="app-container">
    <nav id="sidebar" class="sidebar"></nav>
    
    <main class="main-content">
      <div class="page-header">
        <div>
          <h1>Registro de Atendimentos</h1>
          <p>Histórico de interações, consultas e reuniões com clientes.</p>
        </div>
        <button id="btn-novo-atendimento" class="btn-primary">
          <i class="fa-solid fa-plus"></i> Registrar Atendimento
        </button>
      </div>

      <!-- Modal Elaborado -->
      <div id="modal-atendimento" class="modal-overlay" style="display: none;">
        <div class="modal-content" style="max-width: 700px;">
          <form id="form-atendimento">
            <div class="modal-header">
              <h2>Registrar Interação</h2>
            </div>
            
            <div class="modal-body">
              <!-- Cliente e Assunto -->
              <div class="form-group">
                <label>Cliente *</label>
                <select id="atend-cliente" required>
                  <option value="">Selecione o cliente...</option>
                </select>
              </div>

              <div class="form-group">
                <label>Assunto / Título *</label>
                <div class="login-input-group" style="margin-bottom:0">
                  <input type="text" id="atend-titulo" placeholder="Ex: Dúvidas sobre andamento processual" required>
                  <i class="fa-solid fa-heading"></i>
                </div>
              </div>

              <!-- Grid de Detalhes -->
              <div style="display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 16px; margin-top: 16px;">
                <div class="form-row">
                  <div class="form-group">
                    <label>Data *</label>
                    <input type="date" id="atend-data" required>
                  </div>
                  <div class="form-group">
                    <label>Hora *</label>
                    <input type="time" id="atend-hora">
                  </div>
                </div>
                <div class="form-group">
                  <label>Canal</label>
                  <select id="atend-canal">
                    <option value="WhatsApp">WhatsApp</option>
                    <option value="Telefone">Telefone</option>
                    <option value="Presencial">Presencial</option>
                    <option value="E-mail">E-mail</option>
                    <option value="Videoconferência">Videoconferência</option>
                  </select>
                </div>
                <div class="form-group">
                  <label>Duração (aprox)</label>
                  <input type="text" id="atend-duracao" placeholder="Ex: 30 min">
                </div>
              </div>

              <div class="form-group" style="margin-bottom: 0;">
                <label>Resumo / Anotações</label>
                <textarea id="atend-anotacoes" rows="4" placeholder="Descreva o que foi tratado, orientações passadas e próximos passos..."></textarea>
              </div>
            </div>

            <div class="modal-footer">
              <button type="button" id="btn-cancelar" class="btn-secondary">Cancelar</button>
              <button type="submit" class="btn-primary">Salvar Registro</button>
            </div>
          </form>
        </div>
      </div>

      <!-- Container da Lista -->
      <div id="lista-atendimentos-container"></div>
    </main>
  </div>

  <script type="module" src="js/supabase.js"></script><script type="module" src="js/auth.js"></script><script type="module" src="js/guard.js"></script><script type="module" src="js/sidebar.js"></script><script type="module" src="js/atendimentos.js"></script>
</body>
</html>
