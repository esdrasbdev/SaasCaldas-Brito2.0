<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Agenda - Sistema Jurídico</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
  <link rel="stylesheet" href="css/reset.css">
  <link rel="stylesheet" href="css/style.css">
  <link rel="stylesheet" href="css/sidebar.css">
  <script src="js/env.js"></script>

</head>
<body>
  <div class="app-container">
    <nav id="sidebar" class="sidebar"></nav>
    
    <main class="main-content">
      <div class="page-header">
        <div>
          <h1>Agenda de Compromissos</h1>
          <p>Gerencie audiências, perícias e prazos em formato de lista.</p>
        </div>
        <button id="btn-novo-evento" class="btn-primary">
          <i class="fa-solid fa-plus"></i> Novo Agendamento
        </button>
      </div>
      
      <!-- Busca -->
      <div class="card-section" style="margin-bottom: 16px;">
        <div style="display:flex; gap:12px; align-items:center;">
          <div style="flex: 1; position: relative;">
            <i class="fa-solid fa-magnifying-glass" style="position:absolute; left: 12px; top: 11px; color: #94a3b8; pointer-events:none;"></i>
            <input id="agenda-busca" type="text" placeholder="Buscar agenda (assunto, cliente, participantes, local, data)..." autocomplete="off" style="padding-left: 40px;" />
          </div>
          <button id="agenda-busca-limpar" class="btn-secondary" type="button" style="white-space:nowrap;">Limpar</button>
        </div>
      </div>

      <!-- Container Principal (Tabela) -->
      <div id="view-agenda-container"></div>


      <!-- Modal Novo Agendamento (Layout Melhorado) -->
      <div id="modal-container" class="modal-overlay" style="display: none;">
        <div class="modal-content" style="max-width: 700px;">
          <form id="form-agenda">
            <div class="modal-header">
              <h2 id="modal-titulo">Novo Agendamento</h2>
            </div>
            <div class="modal-body">
              <!-- Título/Assunto -->
              <div class="form-group">
                <label for="agenda-titulo">Assunto / Título da Reunião *</label>
                <input type="text" id="agenda-titulo" placeholder="Ex: Reunião Inicial ou Fechamento de Contrato" required>
              </div>

              <!-- Data e Hora - Lado a Lado -->
              <div style="display: grid; grid-template-columns: 2fr 1fr; gap: 16px;">
                <div class="form-group">
                  <label for="agenda-data">Data *</label>
                  <input type="date" id="agenda-data" required>
                </div>
                <div class="form-group">
                  <label for="agenda-hora">Hora *</label>
                  <input type="time" id="agenda-hora" required>
                </div>
              </div>

              <!-- Local -->
              <div class="form-group">
                <label for="agenda-local">Local / Link *</label>
                <input type="text" id="agenda-local" placeholder="Ex: Fórum Central, Escritório ou Link Zoom" required>
              </div>

              <!-- Cliente e Processo Vinculado -->
              <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 16px;">
                <div class="form-group">
                  <label for="agenda-cliente-single">Cliente Vinculado (Opcional)</label>
                  <select id="agenda-cliente-single"></select>
                </div>
                <div class="form-group">
                  <label for="agenda-processo">Processo Vinculado (Opcional)</label>
                  <select id="agenda-processo"></select>
                </div>
              </div>

              <!-- Complemento -->
              <div class="form-group">
                <label for="agenda-extra">Informação Adicional (Vara/Perito/Link)</label>
                <input type="text" id="agenda-extra" placeholder="Ex: 5ª Vara Cível ou Dr. Carlos ou https://zoom.us/j/...">
              </div>

              <!-- Seleção de Participantes - COMPACTO COM BUSCA -->
              <div id="bloco-participantes" style="margin-top: 24px; padding-top: 16px; border-top: 1px solid var(--cinza-borda);">
                <h3 style="margin-bottom: 12px; font-size: 1rem; color: var(--azul-escuro);">Participantes da Reunião</h3>
                
                <!-- Busca de Clientes -->
                <div class="form-group" style="margin-bottom: 12px;">
                  <label style="font-weight: 600; font-size: 0.9rem;"> <i class="fa-solid fa-users" aria-hidden="true" style="margin-right:8px;color:var(--azul-escuro);"></i> Clientes</label>
                  <div style="position: relative; margin-top: 4px;">
                    <i class="fa-solid fa-search" style="position: absolute; left: 12px; top: 11px; color: #999; pointer-events: none; font-size: 0.9rem;"></i>
                    <input type="text" id="agenda-clientes-search" placeholder="Buscar cliente..." style="width: 100%; padding: 8px 12px 8px 36px; border: 1px solid var(--cinza-borda); border-radius: 6px; font-size: 0.9rem;">
                    <div id="agenda-clientes-dropdown" style="display: none; position: absolute; top: 100%; left: 0; right: 0; background: white; border: 1px solid #ddd; border-top: none; border-radius: 0 0 6px 6px; max-height: 200px; overflow-y: auto; z-index: 100; box-shadow: 0 4px 6px rgba(0,0,0,0.1);"></div>
                  </div>
                  <div id="agenda-clientes-tags" style="margin-top: 8px; display: flex; flex-wrap: wrap; gap: 6px;"></div>
                </div>

                <!-- Busca de Equipe Interna -->
                <div class="form-group">
                  <label style="font-weight: 600; font-size: 0.9rem;"> <i class="fa-solid fa-user-tie" aria-hidden="true" style="margin-right:8px;color:var(--azul-escuro);"></i> Equipe Interna</label>
                  <div style="position: relative; margin-top: 4px;">
                    <i class="fa-solid fa-search" style="position: absolute; left: 12px; top: 11px; color: #999; pointer-events: none; font-size: 0.9rem;"></i>
                    <input type="text" id="agenda-usuarios-search" placeholder="Buscar membro..." style="width: 100%; padding: 8px 12px 8px 36px; border: 1px solid var(--cinza-borda); border-radius: 6px; font-size: 0.9rem;">
                    <div id="agenda-usuarios-dropdown" style="display: none; position: absolute; top: 100%; left: 0; right: 0; background: white; border: 1px solid #ddd; border-top: none; border-radius: 0 0 6px 6px; max-height: 200px; overflow-y: auto; z-index: 100; box-shadow: 0 4px 6px rgba(0,0,0,0.1);"></div>
                  </div>
                  <div id="agenda-usuarios-tags" style="margin-top: 8px; display: flex; flex-wrap: wrap; gap: 6px;"></div>
                </div>
              </div>

              <!-- Observações -->
              <div class="form-group" style="margin-top: 16px;">
                <label for="agenda-obs">Observações (Detalhes adicionais)</label>
                <textarea id="agenda-obs" rows="2" placeholder="Notas importantes sobre a reunião..."></textarea>
              </div>
            </div>
            <div class="modal-footer">
              <button type="button" id="btn-cancelar" class="btn-secondary">Cancelar</button>
              <button type="submit" class="btn-primary">Salvar Agendamento</button>
            </div>
          </form>
        </div>
      </div>
    </main>
  </div>

  <script type="module" src="js/supabase.js"></script><script type="module" src="js/auth.js"></script><script type="module" src="js/guard.js"></script><script type="module" src="js/sidebar.js"></script><script type="module" src="js/agenda.js"></script>
</body>
</html>
