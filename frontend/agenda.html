<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Agenda - Sistema Jurídico</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
  <link rel="stylesheet" href="css/reset.css">
  <link rel="stylesheet" href="css/style.css">
  <link rel="stylesheet" href="css/sidebar.css">
  <script src="js/env.js"></script>

</head>
<body>
  <div class="app-container">
    <nav id="sidebar" class="sidebar"></nav>
    
    <main class="main-content">
      <div class="page-header">
        <div>
          <h1>Agenda de Compromissos</h1>
          <p>Gerencie audiências, perícias e prazos em formato de lista.</p>
        </div>
        <button id="btn-novo-evento" class="btn-primary">
          <i class="fa-solid fa-plus"></i> Novo Agendamento
        </button>
      </div>
      
      <!-- Container Principal (Tabela) -->
      <div id="view-agenda-container"></div>

      <!-- Modal Novo Agendamento (Layout Compacto e Espaçado) -->
      <div id="modal-container" class="modal-overlay" style="display: none;">
        <div class="modal-content">
          <form id="form-agenda">
            <div class="modal-header">
              <h2 id="modal-titulo">Novo Agendamento</h2>
            </div>
            <div class="modal-body">
              <!-- Linha 1: Tipo + Data -->
              <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 16px;">
                <div class="form-group">
                  <label>Tipo de Evento *</label>
                  <select id="agenda-tipo" required>
                    <option value="reuniao">Reunião / Consulta</option>
                    <option value="audiencia">Audiência</option>
                    <option value="pericia">Perícia</option>
                  </select>
                </div>
                <div class="form-row">
                  <div class="form-group">
                    <label>Data *</label>
                    <input type="date" id="agenda-data" required>
                  </div>
                  <div class="form-group">
                    <label>Hora *</label>
                    <input type="time" id="agenda-hora" required>
                  </div>
                </div>
              </div>

              <!-- Vínculo a Participantes (para Reunião) -->
              <div id="bloco-participantes" style="display: none;">
                <p style="font-size: 0.8rem; color: var(--cinza-medio); margin-top: -10px; margin-bottom: 10px;">Selecione quem participará da reunião:</p>
                <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 16px;">
                    <div class="form-group">
                      <label>Clientes</label>
                      <div id="agenda-clientes-list" class="checkbox-list-container"></div>
                    </div>
                    <div class="form-group">
                      <label>Equipe Interna</label>
                      <div id="agenda-usuarios-list" class="checkbox-list-container"></div>
                    </div>
                </div>
              </div>

              <!-- Vínculos Gerais (Cliente e Processo) -->
              <div id="bloco-vinculos" style="display: grid; grid-template-columns: 1fr 1fr; gap: 16px;">
                <div class="form-group">
                  <label for="agenda-cliente-single">Cliente Vinculado (Opcional)</label>
                  <select id="agenda-cliente-single"></select>
                </div>
                <div class="form-group">
                  <label>Processo Vinculado (Opcional)</label>
                  <select id="agenda-processo"></select>
                </div>
              </div>

              <!-- Linha 3: Local + Complemento -->
              <div style="display: grid; grid-template-columns: 2fr 1fr; gap: 16px;">
                <div class="form-group">
                  <label>Local / Link</label>
                  <input type="text" id="agenda-local" placeholder="Ex: Fórum Central ou Sala Zoom" required>
                </div>
                <div class="form-group">
                  <label>Complemento (Vara/Perito)</label>
                  <input type="text" id="agenda-extra" placeholder="Ex: 5ª Vara Cível ou Dr. Carlos">
                </div>
              </div>

              <div class="form-group" style="margin-bottom: 0;">
                <label>Observações</label>
                <textarea id="agenda-obs" rows="2" placeholder="Detalhes adicionais..."></textarea>
              </div>
            </div>
            <div class="modal-footer">
              <button type="button" id="btn-cancelar" class="btn-secondary">Cancelar</button>
              <button type="submit" class="btn-primary">Salvar Agendamento</button>
            </div>
          </form>
        </div>
      </div>
    </main>
  </div>

  <script type="module" src="js/supabase.js"></script><script type="module" src="js/auth.js"></script><script type="module" src="js/guard.js"></script><script type="module" src="js/sidebar.js"></script><script type="module" src="js/agenda.js"></script>
</body>
</html>
