<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Novo Processo - Sistema Jurídico</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
  <link rel="stylesheet" href="css/reset.css">
  <link rel="stylesheet" href="css/style.css">
  <link rel="stylesheet" href="css/sidebar.css">
</head>
<body>
  <div class="app-container">
    <nav id="sidebar" class="sidebar"></nav>
    
    <main class="main-content">
      <div class="page-header">
        <h1><i class="fa-solid fa-plus"></i> Novo Processo</h1>
        <div class="page-actions">
          <a href="processos.html" class="btn btn-secondary">
            <i class="fa-solid fa-arrow-left"></i> Voltar
          </a>
        </div>
      </div>
      
      <form id="form-processo-novo" class="form-processo">
        <div class="form-section">
          <h3>Dados do Processo</h3>
          <div class="form-row">
            <div class="form-group">
              <label>Nº CNJ *</label>
              <input id="numero-cnj" required placeholder="0001234-56.2024.8.26.0001">
            </div>
            <div class="form-group">
              <label>Status</label>
              <select id="status-processo">
                <option value="ATIVO">Ativo</option>
                <option value="ARQUIVADO">Arquivado</option>
              </select>
            </div>
          </div>
          <div class="form-row">
            <div class="form-group">
              <label>Tribunal</label>
              <input id="tribunal" placeholder="TJSP">
            </div>
            <div class="form-group">
              <label>Vara</label>
              <input id="vara" placeholder="3ª Vara Cível">
            </div>
          </div>
        </div>
        
        <div class="form-section">
          <h3>Vínculos</h3>
          <div class="form-group">
            <label>Cliente *</label>
            <select id="cliente-id" required>
              <option value="">Carregando clientes...</option>
            </select>
          </div>
          <div class="form-group">
            <label>Advogado</label>
            <select id="advogado-id">
              <option value="">Carregando advogados...</option>
            </select>
          </div>
        </div>
        
        <div class="form-actions">
          <button type="button" onclick="history.back()" class="btn btn-secondary">Cancelar</button>
          <button type="submit" class="btn btn-primary">Criar Processo</button>
        </div>
      </form>
    </main>
  </div>

  <script type="module" src="js/supabase.js"></script>
  <script type="module" src="js/auth.js"></script>
  <script type="module" src="js/guard.js"></script>
  <script type="module" src="js/sidebar.js"></script>
  <script type="module">
    import { supabase } from './js/supabase.js';

    document.getElementById('form-processo-novo').onsubmit = async (e) => {
      e.preventDefault();
      const processo = {
        numero_cnj: document.getElementById('numero-cnj').value,
        status: document.getElementById('status-processo').value,
        tribunal: document.getElementById('tribunal').value,
        vara: document.getElementById('vara').value,
        cliente_id: document.getElementById('cliente-id').value,
        advogado_id: document.getElementById('advogado-id').value || null
      };
      
      const {error} = await supabase.from('processos').insert([processo]);
      if (!error) {
        alert('Processo criado!');
        window.location.href = 'processos.html';
      } else {
        alert('Erro: ' + error.message);
      }
    };
    
    // Carrega selects after auth
    setTimeout(() => {
      supabase.from('clientes').select('id, nome').then(({data}) => {
        const select = document.getElementById('cliente-id');
        select.innerHTML = '<option value="">Selecione cliente</option>' + data.map(c => `<option value="${c.id}">${c.nome}</option>`).join('');
      });
      
      supabase.from('usuarios').select('id, nome').eq('role', 'ADVOGADO').then(({data}) => {
        const select = document.getElementById('advogado-id');
        select.innerHTML = '<option value="">Selecione advogado</option>' + data.map(u => `<option value="${u.id}">${u.nome}</option>`).join('');
      });
    }, 500);
  </script>

</body>
</html>
